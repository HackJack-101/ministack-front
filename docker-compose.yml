services:
  ministack:
    image: nahuelnucera/ministack:latest
    container_name: ministack
    pull_policy: always
    ports:
      - "4566:4566"
    environment:
      - GATEWAY_PORT=4566
      - LOG_LEVEL=INFO
      - S3_PERSIST=1
      - PERSIST_STATE=1
    volumes:
      - ./data/s3:/tmp/ministack-data/s3
      - ./data/state:/tmp/ministack-state
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  ministack-ui:
    container_name: ministack-ui
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8089:80"
    restart: unless-stopped
    depends_on:
      ministack:
        condition: service_healthy
